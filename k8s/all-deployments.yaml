apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: healthcare-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: healthcare-platform/appointment-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5004
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: APPOINTMENT_PORT
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: APPOINTMENT_MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: JWT_SECRET
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: NOTIFICATION_SERVICE_URL
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: DOCTOR_SERVICE_URL
          volumeMounts:
            - name: appointment-uploads
              mountPath: /app/uploads
      volumes:
        - name: appointment-uploads
          emptyDir: {}
---
